async function go(){
 const pw=document.getElementById('pw').value;
 try{
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(DATA.salt),iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(DATA.iv)},key,b64(DATA.ct));
  document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
  document.getElementById('gate').style.display='none';
  sessionStorage.setItem('rbpw',pw);
 }catch(e){document.getElementById('err').textContent='비밀번호가 올바르지 않습니다';}
}
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
const saved=sessionStorage.getItem('rbpw');
if(saved){document.getElementById('pw').value=saved;go();}
</script></body></html>
